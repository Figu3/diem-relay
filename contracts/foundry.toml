[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
]

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 256
depth = 50

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
